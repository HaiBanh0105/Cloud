<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Danh sách sinh viên - MariaDB</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        padding: 40px;
        background-color: #f8f9fa;
      }
      .header-title {
        color: #28a745;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .table thead {
        background-color: #28a745;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="header-title">Danh sách sinh viên (MariaDB)</h2>
      <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead>
          <tr>
            <th>#</th>
            <th>Student ID</th>
            <th>Fullname</th>
            <th>DOB</th>
            <th>Major</th>
          </tr>
        </thead>
        <tbody>
          {% for s in students %}
          <tr>
            <td>{{ loop.index }}</td>
            <td>{{ s.student_id }}</td>
            <td>{{ s.fullname }}</td>
            <td>{{ s.dob }}</td>
            <td>{{ s.major }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
