<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Danh sách sinh viên - JSON</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        padding: 40px;
        background-color: #f8f9fa;
      }
      .header-title {
        color: #007bff;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .table thead {
        background-color: #007bff;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 class="header-title">Danh sách sinh viên (JSON)</h2>
      <table class="table table-bordered table-hover bg-white shadow-sm">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Major</th>
            <th>GPA</th>
          </tr>
        </thead>
        <tbody>
          {% for s in students %}
          <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.major }}</td>
            <td>{{ s.gpa }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
