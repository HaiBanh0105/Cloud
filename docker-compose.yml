networks:
  cloud-net:
    name: cloud-net

services:
  # --- THÊM 2 WEB SERVER NÀY VÀO ĐỂ TEST LOAD BALANCER ---

  web-frontend-server1:
    image: nginx:alpine
    container_name: web-frontend-server1
    # Lệnh này vừa tạo trang chủ, vừa tạo folder /metrics và file index.html bên trong đó
    command: >
      sh -c "mkdir -p /usr/share/nginx/html/metrics && 
             echo 'Hello from Web 1' > /usr/share/nginx/html/index.html && 
             echo '# dummy metrics' > /usr/share/nginx/html/metrics/index.html && 
             nginx -g 'daemon off;'"
    networks: [cloud-net]

  web-frontend-server2:
    image: nginx:alpine
    container_name: web-frontend-server2
    command: >
      sh -c "mkdir -p /usr/share/nginx/html/metrics && 
             echo 'Hello from Web 2' > /usr/share/nginx/html/index.html && 
             echo '# dummy metrics' > /usr/share/nginx/html/metrics/index.html && 
             nginx -g 'daemon off;'"
    networks: [cloud-net]

  application-backend-server:
    build: ./application-backend-server
    image: VoDatHai/app:dev
    container_name: application-backend-server
    networks: [cloud-net]
    ports: ["8085:8081"]
    environment:
      # OIDC_ISSUER:   "http://authentication-identity-server:8080/realms/master"
      # OIDC_AUDIENCE: "myapp"

      # mở rộng
      OIDC_ISSUER: "http://host.docker.internal:8081/realms/realm_52300021"
      OIDC_AUDIENCE: "myapp"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  authentication-identity-server:
    image: quay.io/keycloak/keycloak:latest
    container_name: authentication-identity-server
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: "localhost"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports: ["8081:8080"]
    restart: unless-stopped
    networks: [cloud-net]

  monitoring-node-exporter-server:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter-server
    ports: ["9100:9100"]
    networks: [cloud-net]

  monitoring-prometheus-server:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus-server
    ports: ["9090:9090"]
    volumes:
      - ./monitoring-prometheus-server/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [cloud-net]

  monitoring-grafana-dashboard-server:
    image: grafana/grafana:latest
    container_name: monitoring-grafana-dashboard-server
    ports: ["3000:3000"]
    networks: [cloud-net]

  api-gateway-proxy-server:
    image: nginx:stable
    container_name: api-gateway-proxy-server
    depends_on:
      - web-frontend-server1
      - web-frontend-server2
      - application-backend-server
      - authentication-identity-server
    ports: ["80:80"]
    volumes:
      - ./api-gateway-proxy-server/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [cloud-net]
    restart: unless-stopped
