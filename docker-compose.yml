networks:
  cloud-net:
    name: cloud-net
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

services:
  web-frontend-server1:
    build: ./web-frontend-server
    container_name: web-frontend-server1
    image: duyphan020/web:dev
    restart: unless-stopped
    networks:
      cloud-net:
        ipv4_address: 10.10.10.10
    deploy:
      resources:
        limits:
          memory: 256M

  web-frontend-server2:
    build: ./web-frontend-server
    container_name: web-frontend-server2
    image: duyphan020/web:dev
    restart: unless-stopped
    networks:
      cloud-net:
        ipv4_address: 10.10.10.11
    deploy:
      resources:
        limits:
          memory: 256M

  application-backend-server:
    build: ./application-backend-server
    # image: duyphan020/app:dev
    container_name: application-backend-server
    restart: unless-stopped
    depends_on:
      relational-database-server:
        condition: service_healthy
    networks:
      cloud-net:
        ipv4_address: 10.10.10.20
    ports: ["8085:8081"]
    environment:
      OIDC_ISSUER: "http://authentication-identity-server:8080/realms/master"
      OIDC_AUDIENCE: "myapp"
      # mở rộng
      # OIDC_ISSUER: "http://host.docker.internal:8081/realms/realm_52300021"
      # OIDC_AUDIENCE: "myapp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 1G

  relational-database-server:
    image: mariadb:11
    container_name: relational-database-server
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: studentdb
      MARIADB_ROOT_HOST: "%"
    volumes:
      - ./relational-database-server/init:/docker-entrypoint-initdb.d:ro
      - ./relational-database-server/data:/var/lib/mysql
    ports: ["3306:3306"]
    networks:
      cloud-net:
        ipv4_address: 10.10.10.30
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-proot",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  authentication-identity-server:
    image: quay.io/keycloak/keycloak:latest
    container_name: authentication-identity-server
    command: ["start-dev"]
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
    volumes:
      - ./authentication-identity-server/data:/opt/keycloak/data
    ports: ["8081:8080"]
    networks:
      cloud-net:
        ipv4_address: 10.10.10.40
    deploy:
      resources:
        limits:
          memory: 2G

  object-storage-server:
    image: minio/minio
    container_name: object-storage-server
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./object-storage-server/data:/data
    ports: ["9000:9000", "9001:9001"]
    networks:
      cloud-net:
        ipv4_address: 10.10.10.50
    deploy:
      resources:
        limits:
          memory: 512M

  internal-dns-server:
    image: internetsystemsconsortium/bind9:9.18
    container_name: internal-dns-server
    restart: unless-stopped
    ports:
      - "1053:53/udp"
    volumes:
      - ./internal-dns-server/named.conf:/etc/bind/named.conf:ro
      - ./internal-dns-server/named.conf.options:/etc/bind/named.conf.options:ro
      - ./internal-dns-server/named.conf.local:/etc/bind/named.conf.local:ro
      - ./internal-dns-server/db.cloud.local:/etc/bind/db.cloud.local:ro
    networks:
      cloud-net:
        ipv4_address: 10.10.10.254
    deploy:
      resources:
        limits:
          memory: 128M

  monitoring-node-exporter-server:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter-server
    restart: unless-stopped
    ports: ["9100:9100"]
    networks:
      cloud-net:
        ipv4_address: 10.10.10.71
    deploy:
      resources:
        limits:
          memory: 128M

  monitoring-prometheus-server:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus-server
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./monitoring-prometheus-server/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring-prometheus-server/data:/prometheus
    networks:
      cloud-net:
        ipv4_address: 10.10.10.70
    deploy:
      resources:
        limits:
          memory: 1G

  monitoring-grafana-dashboard-server:
    image: grafana/grafana:latest
    container_name: monitoring-grafana-dashboard-server
    restart: unless-stopped
    ports: ["3000:3000"]
    volumes:
      - ./monitoring-grafana-dashboard-server/data:/var/lib/grafana
    networks:
      cloud-net:
        ipv4_address: 10.10.10.80
    deploy:
      resources:
        limits:
          memory: 512M

  api-gateway-proxy-server:
    image: nginx:stable
    container_name: api-gateway-proxy-server
    restart: unless-stopped
    depends_on:
      - internal-dns-server
      - web-frontend-server1
      - web-frontend-server2
    ports: ["8080:80"]
    volumes:
      - ./api-gateway-proxy-server/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      cloud-net:
        ipv4_address: 10.10.10.90
    dns:
      - 10.10.10.254
    dns_search:
      - cloud.local
    deploy:
      resources:
        limits:
          memory: 256M
